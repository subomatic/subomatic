name: Signed release (desktop)

# Publishes the SIGNED + NOTARIZED Subomatic **desktop** (Tauri GUI) release.
# Triggers on a push to a release/** branch (only maintainers can create those —
# a fork PR cannot, so the signing secrets stay safe) or manually. This job has
# access to the signing secrets; never make it reachable from pull_request /
# pull_request_target. Release flow:
#   1. Bump the version in src-tauri/tauri.conf.json.
#   2. Push a release/<version> branch (e.g. release/0.1.0) — or run manually.
# CI provisions the keys (Developer ID cert + notary API key + minisign updater
# key) and toolchain, then calls scripts/release.sh, which signs the .app with
# Developer ID, notarizes + staples the .app and the DMG, and publishes to
# subomatic/subomatic. (The separate CLI release lives in release.yml.)
on:
  push:
    branches: ["release/**"]
  workflow_dispatch:
    inputs:
      notes:
        description: "Release notes (shown in latest.json + the GitHub release)"
        required: true
        default: "Subomatic desktop release"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Single-repo publish (binaries + latest.json land on THIS repo), so the built-in
# GITHUB_TOKEN suffices — no cross-repo PAT. Needs contents:write to publish.
permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14            # arm64 — matches the darwin-aarch64 artifact
    environment: release         # optional: add required reviewers in Settings → Environments
    steps:
      - uses: actions/checkout@v4

      # Cache the Cargo workspace (subomatic-core + the Tauri desktop crate).
      - uses: Swatinem/rust-cache@v2
        with:
          key: signed-release-desktop

      - name: Setup Node + Tauri CLI
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci

      - name: Import macOS signing identity into a throwaway keychain
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KCPW="$(openssl rand -base64 24)"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KCPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm "$RUNNER_TEMP/cert.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Write updater (minisign) key
        env:
          UPDATER_KEY: ${{ secrets.TAURI_UPDATER_KEY }}
        run: |
          mkdir -p ~/.tauri
          printf '%s' "$UPDATER_KEY" > ~/.tauri/subomatic-updater.key

      - name: Write notary (App Store Connect) API key
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
        run: printf '%s' "$APPLE_API_KEY_B64" | base64 --decode > "$RUNNER_TEMP/notary-key.p8"

      - name: Build, sign & publish (scripts/release.sh)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}           # built-in token; publishes to this repo
          MACOS_SIGNING_IDENTITY: ${{ vars.MACOS_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/notary-key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # Pass notes via env (never interpolate ${{ }} into a run: shell — a
          # crafted value could inject commands into this secret-bearing job).
          NOTES: ${{ inputs.notes || format('Subomatic desktop release ({0})', github.ref_name) }}
        run: scripts/release.sh "$NOTES"
