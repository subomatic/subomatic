name: Release binaries

# Builds unsigned `subomatic` CLI binaries for the desktop targets on a version
# tag (or manual run). The CLI links libav (LGPL) via FFI, so each runner installs
# libav + libclang below. NOTE: these link the runner's *system* libav to produce
# test/dev binaries. Binaries for public distribution must link an LGPL
# (`--disable-gpl`) libav and then be signed/notarized — see PACKAGING.md.
# (Homebrew's ffmpeg is GPL-configured, so the macOS artifacts here are dev-only.)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Least privilege: this workflow only reads code and uploads build artifacts
# (via the Actions API, not the contents API). Constrain the GITHUB_TOKEN so a
# compromised step can't write to the repo. Grant `contents: write` on a
# dedicated job if you later add GitHub Release publishing.
permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # arm64 runner → native arm64 build
            target: aarch64-apple-darwin
          - os: macos-13 # x64 runner → native x64 build (libav links cleanly)
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04 # ffmpeg 4.4, matching the `ffmpeg-the-third` range
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    # Set to 'true' only when ALL Trusted Signing secrets exist, so the optional
    # signing step below is skipped (not failed) when signing isn't fully
    # configured, rather than running with missing credentials. (This workflow
    # has no pull_request trigger; if you ever add one, do NOT use
    # pull_request_target on any job that reads these secrets — fork PRs would
    # then gain access to them.)
    env:
      WINDOWS_SIGNING_ENABLED: ${{
        secrets.AZURE_TENANT_ID != '' &&
        secrets.AZURE_CLIENT_ID != '' &&
        secrets.AZURE_CLIENT_SECRET != '' &&
        secrets.AZURE_TRUSTED_SIGNING_ENDPOINT != '' &&
        secrets.AZURE_TRUSTED_SIGNING_ACCOUNT != '' &&
        secrets.AZURE_TRUSTED_SIGNING_PROFILE != '' }}
    steps:
      - uses: actions/checkout@v5
      # Pinned to a commit SHA (supply-chain hardening); `# stable` records the
      # tracked channel. This job can access the signing secrets, so a mutable
      # action ref would be especially risky here. Bump the SHA deliberately.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install libav + libclang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libavcodec-dev libavformat-dev libavutil-dev libswresample-dev \
            clang libclang-dev pkg-config
      - name: Install libav (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg pkg-config
      - name: Install libav + libclang (Windows, LGPL prebuilt)
        if: runner.os == 'Windows'
        shell: bash
        # NOTE: this pulls a rolling prebuilt to produce *dev* binaries. For a
        # reproducible, auditable release, pin this to your own `--disable-gpl`
        # libav build and verify its checksum (see PACKAGING.md). The guards below
        # fail the job loudly if the download or archive layout is unexpected.
        run: |
          set -euo pipefail
          choco install -y llvm
          url="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl-shared.zip"
          curl -fL -o ffmpeg.zip "$url" || { echo "::error::failed to download libav from $url"; exit 1; }
          7z x ffmpeg.zip -offmpeg-dist
          FF=$(echo "$(pwd)"/ffmpeg-dist/ffmpeg-*-lgpl-shared)
          if [ ! -f "$FF/bin/ffmpeg.exe" ]; then
            echo "::error::unexpected libav archive layout (no bin/ffmpeg.exe under $FF)"; exit 1
          fi
          echo "FFMPEG_DIR=$FF" >> "$GITHUB_ENV"
          echo "$FF/bin" >> "$GITHUB_PATH"
          echo 'LIBCLANG_PATH=C:\Program Files\LLVM\bin' >> "$GITHUB_ENV"
      - name: Build the CLI
        run: cargo build --release -p subomatic-cli --target ${{ matrix.target }}
      # Optional: sign the Windows .exe with Azure Trusted Signing (Microsoft's
      # managed cloud HSM — no physical token). Skipped unless the secrets below
      # are configured. See PACKAGING.md for getting an account and for the
      # signtool-with-a-CA-cert and Microsoft-Store alternatives. Verify the
      # action's latest version and input names against its README before use.
      - name: Sign the Windows binary (optional, if configured)
        if: runner.os == 'Windows' && env.WINDOWS_SIGNING_ENABLED == 'true'
        uses: azure/trusted-signing-action@v0.5.9
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
          files-folder: target/${{ matrix.target }}/release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: subomatic-${{ matrix.target }}
          if-no-files-found: error
          path: |
            target/${{ matrix.target }}/release/subomatic
            target/${{ matrix.target }}/release/subomatic.exe
