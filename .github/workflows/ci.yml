name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Zero-warnings policy: any rustc warning fails the build.
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt · clippy · test · wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all-features
      - name: WASM build (core + bindings stay WASM-clean)
        run: cargo build -p subomatic-core -p subomatic-wasm --target wasm32-unknown-unknown
