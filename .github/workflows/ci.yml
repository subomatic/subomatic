name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Zero-warnings policy: any rustc warning fails the build.
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt · clippy · test · wasm
    # Pinned to 22.04 (ffmpeg 4.4): the `ffmpeg-the-third` version we use targets
    # libav ≤ 6.0, and newer runners (24.04 = ffmpeg 6.1) add AVPixelFormat
    # variants the crate's exhaustive matches don't cover (a compile error).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install libav + libclang (the CLI links libav via FFI)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libavcodec-dev libavformat-dev libavutil-dev libswresample-dev \
            clang libclang-dev pkg-config
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all-features
      - name: WASM build (core + bindings stay WASM-clean)
        run: cargo build -p subomatic-core -p subomatic-wasm --target wasm32-unknown-unknown
