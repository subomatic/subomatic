name: Deploy web app to GitHub Pages

# Manual trigger: enable Pages (Settings → Pages → Source: GitHub Actions) first,
# then run this workflow. Kept off push so it can't fail CI before that setup.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      # Pinned to a commit SHA (supply-chain hardening); `# stable` records the
      # tracked channel. Bump the SHA deliberately when updating the action.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Build the WASM bundle into web/pkg
        run: wasm-pack build crates/subomatic-wasm --target web --out-dir ../../web/pkg
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
